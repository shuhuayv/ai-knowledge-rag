spring:
  application:
    name: ai-knowledge-rag

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:ai_knowledge_rag}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:ai_dev}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

server:
  port: 8080

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  chunk:
    size: ${CHUNK_SIZE:500}
    overlap: ${CHUNK_OVERLAP:80}
  embedding:
    dimension: ${EMBEDDING_DIMENSION:384}
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6333}
    collection: ${QDRANT_COLLECTION:kb_chunks}
    dimension: ${EMBEDDING_DIMENSION:384}

ai:
  mock-enabled: ${AI_MOCK_ENABLED:true}
  provider: ${AI_PROVIDER:mock}
  api-key: ${AI_API_KEY:${ZHIPU_API_KEY:}}
  api-base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${AI_MODEL:glm-4.7-flash}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
  max-tokens: ${AI_MAX_TOKENS:1024}
  temperature: ${AI_TEMPERATURE:0.3}